<div class="users-page">

  <h2>User Management</h2>

  <div class="table-wrapper">

    <!-- 🔥 TOP CONTROLS -->
    <div class="top-controls">

      <!-- ADD BUTTON -->
      <button mat-raised-button color="primary" (click)="openForm()">
        <mat-icon>add</mat-icon> Add User
      </button>

      <!-- SEARCH INPUT -->
      <input
        *ngIf="showSearch"
        #searchInput
        class="search-input"
        placeholder="Search users..."
        (keyup)="applyFilter(searchInput.value)"
      >

      <!-- SEARCH ICON -->
      <button mat-icon-button class="search-icon" (click)="toggleSearch()">
        <mat-icon>search</mat-icon>
      </button>

    </div>

    <!-- 🔥 TABLE -->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <!-- NAME -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="center-text border-right">Name</th>
        <td mat-cell *matCellDef="let u" class="center-text">{{u.name}}</td>
      </ng-container>

      <!-- EMAIL -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="center-text border-right">Email</th>
        <td mat-cell *matCellDef="let u" class="center-text">{{u.email}}</td>
      </ng-container>

      <!-- PHONE -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef class="center-text border-right">Phone</th>
        <td mat-cell *matCellDef="let u" class="center-text">{{u.phone}}</td>
      </ng-container>

      <!-- TEST -->
      <ng-container matColumnDef="test">
        <th mat-header-cell *matHeaderCellDef class="center-text border-right">Test</th>
        <td mat-cell *matCellDef="let u" class="center-text">{{u.test}}</td>
      </ng-container>

      <!-- ACTION -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center-text">Actions</th>
        <td mat-cell *matCellDef="let u; let i = index" class="center-text">

          <button mat-icon-button color="primary" (click)="editUser(u,i)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" (click)="deleteUser(i)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="header-row"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="row"></tr>

    </table>

    <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5,10,20]"
      showFirstLastButtons>
    </mat-paginator>

  </div>

</div>

<!-- MODAL -->
<div class="modal" *ngIf="showForm">
  <div class="modal-box">

    <h3>{{ editIndex !== null ? 'Edit User' : 'Add User' }}</h3>

    <input [(ngModel)]="student.name" placeholder="Name">
    <input [(ngModel)]="student.email" placeholder="Email">
    <input [(ngModel)]="student.phone" placeholder="Phone">
    <input [(ngModel)]="student.test" placeholder="Test">

    <button mat-raised-button color="primary" (click)="addUser()">
      {{ editIndex !== null ? 'Update' : 'Save' }}
    </button>

    <button mat-raised-button color="warn" (click)="closeForm()">Cancel</button>

  </div>
</div>
