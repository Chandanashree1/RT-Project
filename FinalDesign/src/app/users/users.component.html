<div class="users-page">

  <h2>User Management</h2>

  <div class="table-wrapper">

    <!-- TOP CONTROLS -->
    <div class="top-controls">

      <button mat-raised-button color="primary" (click)="openForm()">
        <mat-icon>add</mat-icon> Add User
      </button>

      <input
        *ngIf="showSearch"
        #searchInput
        class="search-input"
        placeholder="Search users..."
        (keyup)="applyFilter(searchInput.value)"
      >

      <button mat-icon-button class="search-icon" (click)="toggleSearch()">
        <mat-icon>search</mat-icon>
      </button>

    </div>

    <!-- TABLE -->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="name" >
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let u">{{u.name}}</td>
      </ng-container>
      
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef >Email</th>
        <td mat-cell *matCellDef="let u">{{u.email}}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let u">{{u.phone}}</td>
      </ng-container>

      <ng-container matColumnDef="test">
        <th mat-header-cell *matHeaderCellDef>Test</th>
        <td mat-cell *matCellDef="let u">{{u.test}}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let u">{{u.role}}</td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let u">
          {{ u.date | date:'dd-MM-yyyy' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let u; let i = index">

          <button mat-icon-button color="primary" (click)="editUser(u)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" (click)="deleteUser(i)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <mat-paginator [pageSize]="5"></mat-paginator>

  </div>

</div>

<!-- ADD / EDIT MODAL -->
<div class="modal" *ngIf="showForm">
  <div class="modal-box">

    <h3>{{ student._id ? 'Edit User' : 'Add User' }}</h3>

    <input [(ngModel)]="student.name" placeholder="Name">
    <input [(ngModel)]="student.email" placeholder="Email">
    <input [(ngModel)]="student.phone" placeholder="Phone">
    <input [(ngModel)]="student.test" placeholder="Test">
    <input [(ngModel)]="student.role" placeholder="Role">

    <!-- ✅ DATE INPUT -->
    <input type="date" [(ngModel)]="student.date">

    <button mat-raised-button color="primary" (click)="addUser()">
      {{ student._id ? 'Update' : 'Save' }}
    </button>

    <button mat-raised-button color="warn" (click)="closeForm()">Cancel</button>

  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal" *ngIf="showDeleteConfirm">
  <div class="modal-box">

    <h3>Confirm Delete</h3>
    <p>Delete <b>{{deleteUserName}}</b>?</p>

    <button mat-raised-button color="warn" (click)="confirmDelete()">Yes</button>
    <button mat-raised-button (click)="cancelDelete()">No</button>

  </div>
</div>
